spotlights:
  - id: adi-heart-transplant-access
    title: The Association of Place-Based Disadvantage and Access to Deceased Donor
      Heart Transplantation
    image: images/spotlights/adi_heart_transplant.png
    journal_logo: images/journals/ajt.svg
    abstract: Area deprivation index (ADI) was associated with heart transplantation
      to a greater extent than other place-based disadvantage indices studied.
      The forthcoming continuous distribution provides an opportunity to
      incorporate ADI to address disparities in heart transplantation.
    citation: Wang AZ, Barrett K, et al. Am J Transplant. 2025.
    doi: 10.1016/j.ajt.2025.09.013
  - id: heart-allocation-risk-score
    title: United States Candidate Risk Score (US-CRS) for Predicting Death Without
      Transplant in Adult Heart Transplant Candidates
    image: images/spotlights/us_crs_auroc.png
    journal_logo: images/journals/jama.svg
    abstract: A new risk score for heart transplant candidates predicts mortality on
      the waiting list, improving allocation beyond the current priority-tier
      system.
    citation: Zhang KC, Narang N, et al. JAMA. 2024;331(3):237-247.
    doi: 10.1001/jama.2023.27029
    pmid: "38170510"
  - id: clif-consortium
    title: Common Longitudinal ICU Data Format (CLIF)
    image: images/spotlights/clif_map.png
    journal_logo: images/journals/icm_logo.jpeg
    abstract: The CLIF consortium establishes a common data standard for ICU data
      science, enabling privacy-preserving federated research across multiple
      hospital systems.
    citation: Rojas JC, Lyons PG, et al. Intensive Care Med. 2025.
    doi: 10.1007/s00134-025-07848-7
    pmid: "40080116"
