spotlights:
- id: slow-life-support
  section: crisis-standards
  title: Slow Life Support for Imminently Dying Patients
  image: images/spotlights/slow_life_support.png
  journal_logo: images/journals/jama.svg
  abstract: 'This viewpoint introduces and explores the ethical implications of "slow
    life support" - the selective and often undisclosed withholding or modulation of
    life sustaining therapies by clinicians in imminently dying patients.'
  citation: Vollbrecht H, Iwashyna TJ, et al. JAMA. 2026.
  doi: 10.1001/jama.2026.8659
- id: lvad-utilization-selection-bias
  section: organ-allocation
  title: 'Artifactual Declines in Durable LVAD Utilization Among Heart Transplant
    Candidates: Selection Bias in Transplant Registries'
  image: images/spotlights/lvad_selection_bias.png
  journal_logo: images/journals/jhlt.svg
  abstract: The STAR MCS file excludes LVADs among currently listed candidates, producing
    artifactual declines in LVAD prevalence and incidence and inflated waitlist outcomes.
    Awareness of registry construction is essential for accurate interpretation of
    LVAD-related outcomes.
  citation: Ahn DJ, Lyden GR, et al. J Heart Lung Transplant. 2026.
  doi: 10.1016/j.healun.2026.06.002
- id: pediatric-heart-status-exceptions-2026
  section: organ-allocation
  title: Status Exceptions and Misalignment of Medical Urgency in U.S. Pediatric Heart
    Transplantation
  image: images/spotlights/pediatric_heart_status_exceptions.png
  journal_logo: images/journals/JACC_logo.jpg
  abstract: Pediatric heart transplant status exceptions are frequently granted to
    candidates who are not at the highest risk of waitlist death, contributing to
    misalignment between assigned medical urgency and actual mortality risk. The findings
    highlight opportunities to refine pediatric heart allocation policy.
  citation: Ahn DJ, Attia A, et al. J Am Coll Cardiol. 2026.
  doi: 10.1016/j.jacc.2026.01.052
- id: clif-consortium
  section: key-publications
  title: Common Longitudinal ICU Data Format (CLIF)
  image: images/spotlights/clif_map.png
  journal_logo: images/journals/icm_logo.jpeg
  abstract: The CLIF consortium establishes a common data standard for ICU data science,
    enabling privacy-preserving federated research across multiple hospital systems.
  citation: Rojas JC, Lyons PG, et al. Intensive Care Med. 2025.
  doi: 10.1007/s00134-025-07848-7
  pmid: '40080116'
  evergreen: true
- id: heart-allocation-risk-score
  section: key-publications
  title: United States Candidate Risk Score (US-CRS) for Predicting Death Without
    Transplant in Adult Heart Transplant Candidates
  image: images/spotlights/us_crs_auroc.png
  journal_logo: images/journals/jama.svg
  abstract: A new risk score for heart transplant candidates predicts mortality on
    the waiting list, improving allocation beyond the current priority-tier system.
  citation: Zhang KC, Narang N, et al. JAMA. 2024;331(3):237-247.
  doi: 10.1001/jama.2023.27029
  pmid: '38170510'
  evergreen: true
- id: transplant-center-survival-benefit
  section: key-publications
  title: Association of Transplant Center With Survival Benefit Among Adults Undergoing
    Heart Transplant in the United States
  image: images/spotlights/transplant_center_survival_benefit.png
  journal_logo: images/journals/jama.svg
  abstract: The 5-year survival benefit associated with heart transplant varied across
    transplant centers, and high survival benefit centers performed heart transplant
    for patients with lower estimated waiting list survival without transplant.
  citation: Parker WF, Anderson AS, et al. JAMA. 2019;322(18):1789-1798.
  doi: 10.1001/jama.2019.15686
  pmid: '31714985'
  evergreen: true
- id: adi-heart-transplant
  section: organ-allocation
  title: The Association of Place-Based Disadvantage and Access to Deceased Donor
    Heart Transplantation
  image: images/spotlights/adi_heart_transplant.png
  journal_logo: images/journals/ajt.svg
  abstract: Area deprivation index (ADI) was associated with heart transplantation
    to a greater extent than other place-based disadvantage indices studied. The forthcoming
    continuous distribution provides an opportunity to incorporate ADI to address
    disparities in heart transplantation.
  citation: Wang AZ, Barrett K, et al. Am J Transplant. 2025.
  doi: 10.1016/j.ajt.2025.09.013
- id: heart-allocation-2018-survival-benefit
  section: organ-allocation
  image: images/spotlights/tolmie_survival_benefit.png
  title: Association of the 2018 U.S. Heart Allocation Policy Change and the Survival
    Benefit of Heart Transplantation
  journal_logo: images/journals/JACC_logo.jpg
  abstract: In 2018, the U.S. heart allocation policy underwent a major change designed
    to increase transplantation of the most medically urgent candidates. The policy
    change has indeed led to better stratification and prioritization of candidates
    by clinical acuity, resulting in higher survival benefit of transplantation performed.
    Combined with higher transplantation rates, the 2018 heart allocation policy has
    saved thousands of life-years and achieved one of its major goals.
  citation: Tolmie SB, Gibbons RD, et al. JACC Heart Fail. 2025;13(7):102480.
  doi: 10.1016/j.jchf.2025.02.026
- id: chicago-vaccination-inequity
  section: scarce-therapeutics
  image: images/spotlights/chicago_vaccination_map.png
  title: Association of Zip Code Vaccination Rate With COVID-19 Mortality in Chicago,
    Illinois
  journal_logo: images/journals/jama.svg
  abstract: Chicago zip codes with the lowest COVID-19 vaccination rates were predominantly
    Black and Hispanic and suffered the highest COVID-19 mortality. Modeling suggests
    equitable vaccine distribution could have prevented a substantial share of deaths
    during the Alpha and Delta waves.
  citation: Zeng S, Pelzer KM, et al. JAMA Netw Open. 2022;5(5):e2214753.
  doi: 10.1001/jamanetworkopen.2022.14753
- id: principles-to-protocols
  section: scarce-therapeutics
  title: 'Errors in Converting Principles to Protocols: Where the Bioethics of U.S.
    Covid-19 Vaccine Allocation Went Wrong'
  journal_logo: images/journals/hastings_logo.jpeg
  abstract: The ACIP's COVID-19 vaccine allocation recommendations were internally
    inconsistent with its own ethical principles - overly broad healthcare worker priority,
    age as the sole high-risk criterion, no place-based distribution, and implicit
    first-come, first-served allocation. Rigorous empirical work and a complete ethical
    framework could have prevented these mistakes and saved lives.
  citation: Parker WF, Persad G, Peek ME. Hastings Cent Rep. 2022;52(5):8-14.
  doi: 10.1002/hast.1416
- id: state-ventilator-guidelines
  section: crisis-standards
  image: images/spotlights/state_ventilator_guidelines.png
  title: Variation in Ventilator Allocation Guidelines by US State During the Coronavirus
    Disease 2019 Pandemic
  journal_logo: images/journals/jama.svg
  abstract: A systematic review of state ventilator allocation guidelines during the
    COVID-19 pandemic found only half of US states had public guidance, with substantial
    variation in triage criteria; most guidelines recommended objective clinical scoring
    systems for rationing decisions.
  citation: Piscitello GM, Kapania EM, et al. JAMA Netw Open. 2020;3(6):e2012606.
  doi: 10.1001/jamanetworkopen.2020.12606
