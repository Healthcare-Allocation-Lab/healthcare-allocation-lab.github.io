backend:
  name: github
  repo: Healthcare-Allocation-Lab/healthcare-allocation-lab.github.io
  branch: main
  base_url: https://hca-cms-oauth.wparker.workers.dev
  auth_endpoint: /auth

publish_mode: editorial_workflow

media_folder: "images/team"
public_folder: "images/team"

collections:
  - name: "team_members"
    label: "Team Members"
    folder: "_team_members"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "member_name", widget: "string" }
      - { label: "Role", name: "role", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "URL-friendly identifier (e.g. jane-doe). Do not change." }
      - { label: "Photo", name: "photo", widget: "image", required: false, hint: "Upload a headshot to images/team/" }
      - { label: "PubMed Name", name: "pubmed_name", widget: "string", required: false, hint: "Your PubMed author name (e.g. Smith JA)" }
      - { label: "Google Scholar URL", name: "google_scholar", widget: "string", required: false }
      - { label: "Personal Website", name: "website", widget: "string", required: false, hint: "URL to personal website (e.g. https://example.github.io/)" }
      - { label: "Page Title", name: "title", widget: "string" }
      - { label: "Page Description", name: "description", widget: "string" }
      - { label: "Bio", name: "body", widget: "markdown" }

  - name: "site_data"
    label: "Site Data"
    files:
      - name: "spotlights"
        label: "Research Spotlights"
        file: "_data/spotlights.yml"
        fields:
          - label: "Spotlights"
            name: "spotlights"
            widget: "list"
            max: 5
            fields:
              - { label: "ID", name: "id", widget: "string", hint: "Unique identifier (e.g. heart-allocation-risk-score). Use lowercase with hyphens." }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Key Figure Image", name: "image", widget: "image", media_folder: "/images/spotlights", public_folder: "images/spotlights", hint: "Upload a key figure or diagram from the paper." }
              - { label: "Journal Logo", name: "journal_logo", widget: "image", required: false, media_folder: "/images/journals", public_folder: "images/journals", hint: "Upload the journal's logo." }
              - { label: "Abstract", name: "abstract", widget: "text", hint: "A condensed 1-2 sentence summary of the paper." }
              - { label: "Citation", name: "citation", widget: "string", hint: "Short citation (e.g. Zhang KC, et al. JAMA. 2024;331(3):237-247.)" }
              - { label: "DOI", name: "doi", widget: "string", required: false, hint: "DOI without https://doi.org/ prefix (e.g. 10.1001/jama.2023.27029)" }
              - { label: "PubMed ID", name: "pmid", widget: "string", required: false }
